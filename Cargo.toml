[package]
name = "dwg"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "Apache-2.0"
description = "Clean-room Apache-2 Rust reader for Autodesk DWG files (R13 through R2018 / AC1032). No Autodesk SDK, no ODA SDK, no GPL-3 dependency."
authors = ["Griffin Radcliffe <151978260+DrunkOnJava@users.noreply.github.com>"]
repository = "https://github.com/DrunkOnJava/dwg-rs"
homepage = "https://github.com/DrunkOnJava/dwg-rs"
documentation = "https://docs.rs/dwg"
readme = "README.md"
keywords = ["dwg", "autocad", "cad", "parser", "file-format"]
categories = ["parser-implementations", "filesystem", "encoding"]
exclude = [
    ".github/",
    ".gitattributes",
    "CHANGELOG.md",
    "examples/probe_*.rs",
    "examples/debug_*.rs",
]

[dependencies]
thiserror = "1"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
byteorder = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
proptest = "1"

[features]
default = []
# Emit per-iteration eprintln! traces from the LZ77 decoder. Only enable
# for debugging; unconditional tracing would wreck performance and flood
# stderr on healthy files.
lz77-trace = []

[[bin]]
name = "dwg-info"
path = "src/bin/dwg_info.rs"

[[bin]]
name = "dwg-corpus"
path = "src/bin/dwg_corpus.rs"

[[bin]]
name = "dwg-dump"
path = "src/bin/dwg_dump.rs"

[[bin]]
name = "dwg-convert"
path = "src/bin/dwg_convert.rs"

[lib]
name = "dwg"
path = "src/lib.rs"

[profile.release]
lto = true
codegen-units = 1
strip = true

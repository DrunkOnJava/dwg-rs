name: GitHub Pages

# V-15 — publish the wasm viewer as a static site on GitHub Pages.
# Triggers on push to main + manual workflow_dispatch. Builds
# `wasm/pkg/` via wasm-pack and copies it alongside
# `docs/viewer/index.html` for deployment.

on:
  push:
    branches: [main]
    paths:
      - 'wasm/**'
      - 'src/**'
      - 'docs/viewer/**'
      - '.github/workflows/pages.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install stable toolchain with wasm32 target
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: wasm -> target
          key: pages-wasm-${{ runner.os }}

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          wasm-pack --version

      - name: Build wasm
        working-directory: wasm
        run: wasm-pack build --target web --release

      - name: Stage the pages artifact
        run: |
          set -euo pipefail
          mkdir -p _site
          cp docs/viewer/index.html _site/index.html
          cp -r wasm/pkg _site/pkg
          # copy bundled sample DWGs if present
          if [ -d wasm/examples/samples ]; then
            cp -r wasm/examples/samples _site/samples
          fi
          ls -la _site/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          # Auto-enable Pages on first run so the repo doesn't need a
          # manual setting-toggle before this workflow becomes green.
          # Subsequent runs see the site already configured and this
          # becomes a no-op.
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

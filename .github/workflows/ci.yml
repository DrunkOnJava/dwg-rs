name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs on the same branch when a new commit arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain with rustfmt
        run: |
          rustup update stable
          rustup component add rustfmt --toolchain stable
      - name: cargo fmt --all -- --check
        run: cargo +stable fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain with clippy
        run: |
          rustup update stable
          rustup component add clippy --toolchain stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy --all-targets --all-features -- -D warnings
        run: cargo +stable clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable, "1.85"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install ${{ matrix.toolchain }} toolchain
        run: rustup toolchain install ${{ matrix.toolchain }} --profile minimal
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.toolchain }}
      - name: cargo build --release
        run: cargo +${{ matrix.toolchain }} build --release --all-features --all-targets
      - name: cargo test --release
        run: cargo +${{ matrix.toolchain }} test --release --all-features

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        run: rustup update stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc --no-deps --all-features
        run: cargo +stable doc --no-deps --all-features

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: cargo deny check all
        run: cargo deny check advisories bans licenses sources

  msrv:
    name: Verify MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install 1.85 toolchain
        run: rustup toolchain install 1.85 --profile minimal
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - name: cargo check --all-features
        run: cargo +1.85 check --all-features

  coverage-smoke:
    name: Coverage smoke test (canonical corpus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        run: rustup update stable
      - uses: Swatinem/rust-cache@v2
      # The canonical corpus lives at tests/fixtures/canonical/ and is
      # committed to the repo. If this job's decoded_ratio drops below
      # the asserted threshold, a dispatcher or decoder regression has
      # landed — see task #93.
      - name: Run coverage_report and assert minimum decode ratio
        run: |
          set -e
          if [ ! -d tests/fixtures/canonical ]; then
            echo "::warning::canonical corpus missing; skipping coverage smoke"
            exit 0
          fi
          OUTPUT=$(cargo +stable run --release --example coverage_report -- tests/fixtures/canonical 2>&1)
          echo "$OUTPUT"
          # Extract the TOTAL ratio percentage. If parse fails or
          # ratio drops below 25% aggregate, fail the job.
          RATIO=$(echo "$OUTPUT" | awk '/^TOTAL/ { for (i=1;i<=NF;i++) if ($i ~ /^[0-9]+\.[0-9]+$/) print $i }' | tail -1)
          if [ -z "$RATIO" ]; then
            echo "::error::could not parse decoded_ratio from coverage_report"
            exit 1
          fi
          # bash float comparison via awk
          PASS=$(awk -v r="$RATIO" 'BEGIN { print (r+0 >= 20.0) ? "1" : "0" }')
          if [ "$PASS" != "1" ]; then
            echo "::error::decoded_ratio $RATIO% < 20% minimum threshold"
            exit 1
          fi
          echo "coverage-smoke PASS: decoded_ratio=$RATIO%"

  pii-guard:
    name: PII guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for PII-shaped leak patterns
        run: |
          set -e
          echo "Scanning repo for patterns that must never be committed..."
          # Each regex catches a *class* of PII without spelling out
          # any specific sensitive value. Broad by design — belt-and-
          # suspenders over local hygiene.
          PATTERNS=(
            # Absolute home paths (macOS, Linux, Windows).
            '/Users/[a-z][a-z0-9._-]+/'
            '/home/[a-z][a-z0-9._-]+/'
            'C:\\Users\\[a-z][a-z0-9._-]+\\'
            # Autodesk build-server paths baked into released DLLs.
            'F:\\Ship\\[0-9]{4}_'
            # Employee OneDrive authoring paths.
            'OneDrive - Autodesk\\[^\\]*\\'
          )
          failed=0
          for p in "${PATTERNS[@]}"; do
            if git grep -I -n -P "$p" -- ':!.github/workflows/' 2>/dev/null; then
              echo "::error::PII-shaped pattern matched: $p"
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            exit 1
          fi
          echo "PII guard: clean."

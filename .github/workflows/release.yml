name: Release

# Triggered on SemVer tag push. Builds cross-platform binaries,
# generates an SBOM, cuts a GitHub draft release, and — gated
# behind the `crates-io` environment (requires a manual-approval
# reviewer configured on the repo) — publishes to crates.io.
#
# The tag regex is deliberately SemVer-strict. `v1`, `v1.2`, or
# `v1.2.3.4` do not trigger — only `vMAJOR.MINOR.PATCH` with an
# optional `-prerelease` suffix (`alpha`, `beta`, `rc`, etc.).

on:
  push:
    tags:
      # Strict SemVer: v<digits>.<digits>.<digits>[-prerelease]
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:

permissions:
  contents: write  # needed to create the GitHub Release

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    # Pre-flight: if this fails, nothing else should run. We
    # deliberately run a full `--dry-run` against the published-
    # crate metadata before any binary builds so a broken
    # Cargo.toml doesn't waste 4 platforms' worth of compile time.
    name: Verify publishable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install stable toolchain
        run: rustup update stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: cargo publish --dry-run
        run: cargo +stable publish --dry-run --all-features

  sbom:
    name: Generate SBOM
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install stable toolchain
        run: rustup update stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate CycloneDX SBOM
        # cargo-cyclonedx writes <crate>.cdx.json alongside each
        # Cargo.toml by default; --override-filename gives a stable
        # name. The older --output-pattern flag was removed in 0.5+.
        run: cargo cyclonedx --format json --override-filename bom
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dwg-rs-sbom
          path: "**/bom.json"

  binaries:
    name: Build binaries — ${{ matrix.target }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          # Four release targets per task spec. aarch64-linux is
          # kept in the matrix because it costs nothing to
          # cross-compile alongside x86_64-linux and people do ask
          # for ARM64 Linux binaries.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          printf '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"\n' >> .cargo/config.toml
      - name: Install toolchain for ${{ matrix.target }}
        run: |
          rustup update stable
          rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ matrix.target }}
      - name: cargo build --release
        # `--all-features` pulls `cli` which is gated `required-features`
        # on every `[[bin]]` in Cargo.toml. Without it, the binaries
        # won't build.
        run: cargo build --release --all-features --target ${{ matrix.target }} --bins
      - name: Archive binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp README.md LICENSE CHANGELOG.md SECURITY.md dist/
          # CLI binaries defined in Cargo.toml as of 0.1.0-alpha.1.
          BINS="dwg-info dwg-corpus dwg-dump dwg-convert dwg-to-dxf dwg-to-gltf dwg-write"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            for b in $BINS; do
              cp "target/${{ matrix.target }}/release/${b}.exe" dist/
            done
            cd dist && 7z a "../dwg-rs-${{ github.ref_name }}-${{ matrix.target }}.zip" ./*
          else
            for b in $BINS; do
              cp "target/${{ matrix.target }}/release/${b}" dist/
            done
            cd dist && tar -czf "../dwg-rs-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" ./*
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dwg-rs-${{ matrix.target }}
          path: dwg-rs-*.*

  github-release:
    name: Attach to GitHub Release
    needs: [verify, sbom, binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
      - name: Flatten for release upload
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "bom.json" \) -exec cp {} release-assets/ \;
          ls -la release-assets/
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: true  # manual publish — do not auto-publish the release page
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}

  # Gated step for the actual crates.io publish. Requires a `crates-io`
  # environment configured on the repo with:
  #   - manual reviewer approval (this is the "manual approval" gate
  #     called out in Q-07)
  #   - `CARGO_REGISTRY_TOKEN` secret containing a scoped crates.io token
  # Without that environment, this job will not run even on tag push —
  # which is the point. `cargo publish` is irrevocable.
  #
  # TODO: once commit signing is in place (pending, see RELEASE.md),
  # add a `gpg --verify` step that fails unless the tag sha is signed.
  publish-crates-io:
    name: Publish to crates.io (manual approval required)
    needs: [verify, sbom, binaries]
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc')
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install stable toolchain
        run: rustup update stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: cargo publish --dry-run (pre-flight)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --all-features --dry-run
      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --all-features

  # --------------------------------------------------------------------
  # Python bindings (PyO3) — intentionally disabled until `python_stubs.rs`
  # graduates from a placeholder. When that lands, flip `if: false` to the
  # real tag condition and wire maturin. Leaving the scaffold in place so
  # the work item is visible in the workflow graph instead of a TODO file.
  # Tracked alongside #420 / Phase 13 WASM/Python roadmap.
  # --------------------------------------------------------------------
  publish-pypi:
    name: Publish Python wheels to PyPI (DISABLED)
    needs: verify
    if: false  # flip to a SemVer-style condition once PyO3 work ships
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Real build would look something like:
      #   - uses: PyO3/maturin-action@<SHA>
      #     with:
      #       command: build
      #       args: --release --out dist --find-interpreter
      #   - name: Publish to PyPI
      #     env:
      #       MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      #     run: maturin publish --skip-existing dist/*
      - name: Placeholder — python bindings not shipped yet
        run: |
          echo "python_stubs.rs is a placeholder; this job is guarded off."
          exit 1

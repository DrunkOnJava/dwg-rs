# git-cliff configuration for automated CHANGELOG generation from
# conventional commits. Run with `git cliff -o CHANGELOG.md` to
# regenerate; or `git cliff --tag vX.Y.Z` to stamp the current
# commit range as a named release.

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html)
(with the 0.x breakage window noted in [RELEASE.md](./RELEASE.md)).

"""

body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | split(pat="\\n") | first | trim }}\
    {% endfor %}
{% endfor %}\n
"""

footer = """
<!-- generated by git-cliff -->
"""

trim = true

[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^docs", group = "Documentation" },
    { message = "^test", group = "Testing" },
    { message = "^chore", group = "Chore" },
    { message = "^ci", group = "CI" },
    { message = "^security", group = "Security" },
    { message = "^release", skip = true },
    { body = ".*security", group = "Security" },
]
filter_commits = false
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
skip_tags = "^v0\\.0\\."
ignore_tags = ""
topo_order = false
sort_commits = "oldest"

# cargo-deny configuration — supply-chain guardrails.
#
# Run with: `cargo deny check`
# Install:  `cargo install cargo-deny --locked`

[advisories]
version = 2
# Fail the build on any unreviewed vulnerability.
yanked = "warn"
ignore = []

[licenses]
version = 2
# Allowed SPDX license identifiers. A dependency with a license outside
# this list fails the build. Apache-2 and MIT are the overwhelming
# Rust ecosystem majority; the others cover common exceptions.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.93
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
# Explicit deny-list: GPL-3 and LGPL-3 crates are copyleft-incompatible
# with this project's Apache-2 license and its clean-room posture.
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
